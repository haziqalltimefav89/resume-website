<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Gallery</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f4f4f9, #e8f0fe);
      margin: 0;
      padding: 20px;
      color: #2c3e50;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 1px 1px 2px #aaa;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .item {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      animation: fadeInUp 0.8s ease;
    }
    .item:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    .item img, .item iframe, .item audio {
      width: 100%;
      border-radius: 8px;
    }
    .item p {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
    /* Animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.8);
    }
    .lightbox img {
      margin: auto;
      display: block;
      max-width: 80%;
      border-radius: 10px;
    }
    .close {
      position: absolute;
      top: 20px; right: 35px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="gallery">

        <img src="image/porchse.jpg" alt="My Car">
